# 01_create_and_persist — メモ作成〜再起動後の永続化確認（雛形・未実行）
#
# 確認シナリオ（19-android-emulator-testing.md §9）:
#   起動 → メモ管理 → 新規作成 → 本文入力 → カテゴリ選択 → visibility選択 →
#   保存 → 表示確認 → 再起動 → 永続化確認
#
# 注意:
# - 画面の可視テキストに依存している。文言・画面構成が変わったら要修正
# - 冒頭で1回だけ clearState:true し、再起動時は clearState を付けないことで
#   「保存したメモが再起動後も残る」ことを検証する
# - testID未整備のため、タイトル欄はラベル文字と placeholder が同じ「タイトル」で
#   曖昧になりうる。ここでは placeholder が一意な本文欄にテスト文字列を入れる
# - 作成保存後は router.replace で詳細画面へ遷移する。一覧へ戻るには端末の戻る操作を使う

appId: com.ykjob.mindhub
---
# 1. アプリ起動（初期状態から開始）
- launchApp:
    clearState: true

# 2. メモ管理を開く
- tapOn: "メモ管理"
- assertVisible: "＋ 新規作成"

# 3. 新規メモ作成画面へ
- tapOn: "＋ 新規作成"
- assertVisible: "カテゴリ"

# 4. カテゴリを選択（画面上部のチップ。文言はNOTE_CATEGORIESに準拠）
- tapOn: "思考メモ"

# 5. 本文にテスト用テキストを入力（placeholderが一意な本文欄）
- scrollUntilVisible:
    element:
      text: "Markdown本文を入力..."
    direction: DOWN
- tapOn: "Markdown本文を入力..."
- inputText: "MaestroTest_daily_note"

# 6. visibility を選択（画面下部のチップ。値はNOTE_VISIBILITIESに準拠）
- scrollUntilVisible:
    element:
      text: "family"
    direction: DOWN
- tapOn: "family"

# 7. 保存（フッターの保存ボタン）
- tapOn: "保存"

# 8. 保存直後は詳細画面。入力した本文が表示されることを確認
- assertVisible: "MaestroTest_daily_note"

# 9. 一覧へ戻って表示を確認（端末の戻る操作で notes 一覧へ）
- back
- assertVisible: "MaestroTest_daily_note"

# 10. アプリを閉じて再起動（clearStateなし＝データを消さない）
- stopApp
- launchApp

# 11. 再起動後もメモが残っていることを確認
- tapOn: "メモ管理"
- assertVisible: "MaestroTest_daily_note"
