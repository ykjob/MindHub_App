# 02_prompt_copy — プロンプト集の検索・展開・コピー確認（雛形・未実行）
#
# 確認シナリオ（19-android-emulator-testing.md §9）:
#   起動 → プロンプト集 → 検索 → カード展開 → コピー → 「コピーしました」確認
#
# 注意:
# - 画面の可視テキストに依存している。文言・画面構成が変わったら要修正
# - コピー成功はクリップボード内容の直接検証ではなく、画面表示「コピーしました」で判定する
#   （copyToClipboard() の成功パスが通ったことの間接的な証明）
# - 検索語「面接」は就活グループのプロンプト名に該当する想定。収録内容が変わったら見直す
# - 検索結果が複数ある場合に備え、展開・コピーは先頭カード（index: 0）を対象にする

appId: com.ykjob.mindhub
---
# 1. アプリ起動
- launchApp

# 2. プロンプト集を開く（ホームヘッダーの導線）
- tapOn: "プロンプト集"
- assertVisible: "プロンプト名・分類で絞り込み"

# 3. 検索欄に文字入力
- tapOn: "プロンプト名・分類で絞り込み"
- inputText: "面接"

# 4. 検索結果のプロンプトが出ることを確認
- assertVisible: "面接回答下書き"

# 5. 先頭カードを展開（折りたたみトグル）
- tapOn:
    text: "▶ プロンプトを表示"
    index: 0

# 6. 先頭カードのコピーを押す
- tapOn:
    text: "コピー"
    index: 0

# 7. コピー成功表示を確認
- assertVisible: "コピーしました"
